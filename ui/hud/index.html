<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - NEURAL HUD</title>
    <style>
        :root {
            --color-idle: #00ff88;
            --color-listening: #00f2ff;
            --color-thinking: #7d00ff;
            --color-executing: #ffaa00;
            --color-speaking: #ff0055;
            --color-success: #00ff88;
            --color-error: #ff3333;
            --accent-color: var(--color-idle);
            --font-main: 'Orbitron', sans-serif;
            --font-sub: 'Rajdhani', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: none; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: transparent; color: #fff;
        }
        #hud-container {
            width: 800px; height: 800px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #hud-container.mini {
            position: fixed; bottom: 30px; right: 30px;
            width: 240px; height: 240px;
        }
        .track {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .t-1 { width: 100%; height: 100%; border-top: 2px solid var(--accent-color); animation: spin-cw 15s linear infinite; }
        .t-2 { width: 88%; height: 88%; border-bottom: 3px solid var(--accent-color); animation: spin-ccw 10s linear infinite; opacity: 0.6; }
        .t-3 { width: 78%; height: 78%; border: 1px dashed var(--accent-color); animation: spin-cw 25s linear infinite; opacity: 0.4; }
        @keyframes spin-cw { 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 100% { transform: rotate(-360deg); } }
        .glass-orb {
            width: 68%; height: 68%; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 70%, #000 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hud-content { z-index: 10; text-align: center; pointer-events: none; }
        #title { font-family: var(--font-main); font-weight: 900; font-size: 28px; letter-spacing: 6px; color: #fff; text-shadow: 0 0 15px var(--accent-color); }
        #subtitle { font-family: var(--font-sub); font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--accent-color); margin-top: 5px; text-transform: uppercase; }
        .mini #title { font-size: 14px; letter-spacing: 4px; }
        .mini #subtitle { display: none; }
        .state-idle { --accent-color: var(--color-idle); }
        .state-listening { --accent-color: var(--color-listening); }
        .state-thinking { --accent-color: var(--color-thinking); }
        .state-executing { --accent-color: var(--color-executing); }
        .state-teaching { --accent-color: #9C27B0; }
        .state-speaking { --accent-color: var(--color-speaking); }
        .state-success { --accent-color: var(--color-success); }
        .state-error { --accent-color: var(--color-error); }
        .state-idle .glass-orb { animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
        .state-thinking .glass-orb { animation: think-pulse 1s infinite alternate; }
        @keyframes think-pulse { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
        .state-teaching .glass-orb { animation: teach-glow 1.5s ease-in-out infinite; }
        @keyframes teach-glow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 5px #9C27B0); }
            50% { filter: brightness(1.3) drop-shadow(0 0 25px #9C27B0); }
        }
        #teach-panel { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-height: 120px; overflow-y: auto; z-index: 20;
            font-family: var(--font-sub); font-size: 10px; color: #9C27B0;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(156,39,176,0.3);
            border-radius: 4px; padding: 6px 10px; display: none; }
        #teach-panel.visible { display: block; }
        #teach-panel .step-item { opacity: 0; transition: opacity 0.3s ease-in; padding: 1px 0; }
        #teach-panel .step-item.visible { opacity: 1; }
        .mini #teach-panel { display: none !important; }
        canvas#electron-mesh { position: absolute; top: 0; left: 0; width: 100%; height: 100%; mix-blend-mode: screen; }
    </style>
</head>
<body class="state-idle">
    <div id="hud-container">
        <div class="track t-1"></div>
        <div class="track t-2"></div>
        <div class="track t-3"></div>
        <div class="glass-orb">
            <canvas id="electron-mesh"></canvas>
            <div class="hud-content">
                <div id="title">JARVIS</div>
                <div id="subtitle">SYSTEM IDLE</div>
            </div>
            <div id="teach-panel"></div>
        </div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const container = document.getElementById('hud-container');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const canvas = document.getElementById('electron-mesh');
        const ctx = canvas.getContext('2d');

        let audioEnergy = 0, targetEnergy = 0;
        let isFullscreen = false;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            initParticles();
        }

        const NUM = 60;
        let particles = [];
        function initParticles() {
            if (!canvas.width || !canvas.height) return;
            particles = [];
            for (let i = 0; i < NUM; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.max(2, (Math.random() * 2 + 2) * canvas.width / 800)
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isNaN(targetEnergy)) targetEnergy = 0;
            audioEnergy += (targetEnergy - audioEnergy) * 0.15;
            const accent = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || '#00ff88';
            const speed = (['thinking','listening','executing','teaching','speaking','error'].includes(document.body.className.replace('state-',''))) ? 3.5 : 1;
            particles.forEach((p, i) => {
                let f = speed * (1 + Math.min(audioEnergy, 1.5) * 4);
                p.x += p.vx * f; p.y += p.vy * f;
                if (p.x < 0) { p.x = 0; p.vx *= -1; }
                if (p.x > canvas.width) { p.x = canvas.width; p.vx *= -1; }
                if (p.y < 0) { p.y = 0; p.vy *= -1; }
                if (p.y > canvas.height) { p.y = canvas.height; p.vy *= -1; }
                ctx.globalAlpha = 1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = accent; ctx.fill();
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x, dy = p.y - p2.y;
                    let d = dx * dx + dy * dy;
                    let maxD = (['listening','speaking','teaching'].includes(document.body.className.replace('state-',''))) ? 12100 : 10000;
                    if (d < maxD) {
                        let dist = Math.sqrt(d);
                        ctx.beginPath(); ctx.strokeStyle = accent;
                        ctx.lineWidth = 1.8;
                        ctx.globalAlpha = (1 - dist / Math.sqrt(maxD)) * 0.65;
                        ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 100);
        draw();

        function updateState(state, message, fs) {
            isFullscreen = fs;
            container.className = fs ? '' : 'mini';
            document.body.className = 'state-' + state.toLowerCase();
            setTimeout(resize, 100);
            const texts = {
                idle: ["JARVIS", "SYSTEM IDLE"],
                listening: ["LISTENING", "AWAITING AUDIO"],
                thinking: ["PROCESSING", "NEURAL LINK"],
                executing: ["EXECUTING", "OVERRIDE"],
                teaching: ["TEACHING", "RECORDING ACTIONS"],
                speaking: ["VOCALIZING", "OUTPUT ACTIVE"],
                success: ["SUCCESS", "TASK COMPLETE"],
                error: ["ERROR", "SYSTEM FAULT"]
            };
            const t = texts[state.toLowerCase()] || ["JARVIS", ""];
            title.textContent = t[0];
            subtitle.textContent = message || t[1];
            // Clear teach panel on any state change
            document.getElementById('teach-panel').classList.remove('visible');
            document.getElementById('teach-panel').innerHTML = '';
        }

        let ws;
        function connect() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            ws = new WebSocket('ws://127.0.0.1:9223');
            ws.onclose = () => setTimeout(connect, 3000);
            ws.onmessage = (event) => {
                const d = JSON.parse(event.data);
                if (d.type === 'state') updateState(d.state, d.message, d.fullscreen);
                else if (d.type === 'teach_step') {
                    const panel = document.getElementById('teach-panel');
                    panel.classList.add('visible');
                    const item = document.createElement('div');
                    item.className = 'step-item';
                    const action = d.action || '?';
                    const target = (d.target || '').length > 45 ? (d.target || '').slice(0, 42) + '...' : (d.target || '');
                    item.textContent = d.step + '. ' + action + ' -> ' + target;
                    panel.appendChild(item);
                    requestAnimationFrame(() => item.classList.add('visible'));
                    panel.scrollTop = panel.scrollHeight;
                }
            };
        }
        connect();
    </script>
</body>
</html>
